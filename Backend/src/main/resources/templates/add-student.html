<div class="card shadow col-md-6 mx-auto">
    <div class="card-body">

        <h3 class="text-center mb-4">Student Form</h3>

        <form th:action="@{/students/save}" th:object="${student}" method="post">

            <!-- IMPORTANT (for update) -->
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">First Name</label>
                <input type="text" th:field="*{firstName}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" th:field="*{lastName}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control" required>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-success">Save</button>
                <a th:href="@{/students}" class="btn btn-secondary">Back</a>
            </div>

        </form>

    </div>
</div>
